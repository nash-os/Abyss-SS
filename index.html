<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Abyss SS | Premium Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --glass: rgba(15, 15, 15, 0.8);
            --silver: #e2e2e2;
            --silver-glow: rgba(226, 226, 226, 0.2);
            --text: #ffffff;
            --dim: #888888;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Destellos Plata Animados */
        .sparkle {
            position: absolute;
            background: white;
            border-radius: 50%;
            filter: blur(1px);
            opacity: 0;
            animation: silverFlash 4s infinite;
        }

        @keyframes silverFlash {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 0.6; transform: scale(1); box-shadow: 0 0 10px white; }
        }

        /* Panel Principal */
        .glass-container {
            background: var(--glass);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3rem;
            width: 450px;
            box-shadow: 0 0 40px rgba(255,255,255,0.05);
            z-index: 10;
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* Login Styles */
        h1 { font-weight: 800; font-size: 2.2rem; letter-spacing: -2px; margin-bottom: 1.5rem; text-align: center; }
        .input-box { margin-bottom: 1rem; }
        label { display: block; font-size: 0.7rem; font-weight: 800; color: var(--dim); margin-bottom: 0.5rem; text-transform: uppercase; }
        input {
            width: 100%; padding: 1rem; background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            border-radius: 10px; color: white; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--silver); box-shadow: 0 0 15px var(--silver-glow); }

        .btn {
            width: 100%; padding: 1rem; background: var(--silver); color: black; border: none;
            border-radius: 10px; font-weight: 800; cursor: pointer; margin-top: 1.5rem; transition: 0.3s;
        }
        .btn:hover { transform: scale(1.02); box-shadow: 0 0 20px white; }

        /* Dashboard Hidden */
        #dashboard { display: none; width: 900px; }
        .dash-layout { display: flex; flex-direction: column; gap: 2rem; }
        .stats { display: flex; gap: 1rem; }
        .stat-card { flex: 1; background: rgba(255,255,255,0.02); padding: 1.5rem; border-radius: 15px; border: 1px solid var(--border); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th { text-align: left; color: var(--dim); font-size: 0.7rem; padding: 1rem; text-transform: uppercase; }
        td { padding: 1rem; border-bottom: 1px solid var(--border); font-family: 'JetBrains Mono'; font-size: 0.8rem; }
        
        .badge { background: white; color: black; padding: 3px 8px; border-radius: 4px; font-size: 0.6rem; font-weight: 800; }
    </style>
</head>
<body>
    <!-- Partículas de destellos -->
    <script>
        for (let i = 0; i < 30; i++) {
            let s = document.createElement('div');
            s.className = 'sparkle';
            s.style.left = Math.random() * 100 + 'vw';
            s.style.top = Math.random() * 100 + 'vh';
            s.style.width = s.style.height = Math.random() * 3 + 'px';
            s.style.animationDelay = Math.random() * 5 + 's';
            document.body.appendChild(s);
        }
    </script>

    <!-- Login -->
    <div id="login" class="glass-container">
        <h1>ABYSS<span style="color:var(--dim)">SS</span></h1>
        <div class="input-box">
            <label>User</label>
            <input type="text" id="userInput" placeholder="Nash">
        </div>
        <div class="input-box">
            <label>Password</label>
            <input type="password" id="passInput" placeholder="••••••">
        </div>
        <button class="btn" onclick="login()">AUTHENTICATE</button>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="glass-container">
        <div class="dash-layout">
            <div style="display:flex; justify-content:space-between; align-items:center">
                <h2>ADMIN_PANEL</h2>
                <button class="btn" style="width:auto; margin:0; padding: 0.5rem 1rem;" onclick="addKey()">+ NEW KEY</button>
            </div>
            <div class="stats">
                <div class="stat-card"><span>KEYS</span><p>1,240</p></div>
                <div class="stat-card"><span>HWIDs</span><p>892</p></div>
                <div class="stat-card"><span>STATUS</span><p style="color:var(--silver)">ONLINE</p></div>
            </div>
            <table>
                <thead><tr><th>License</th><th>Status</th><th>HWID</th><th>Action</th></tr></thead>
                <tbody id="keyBody">
                    <tr>
                        <td>ABYSS-PREMIUM-X92</td>
                        <td><span class="badge">LINKED</span></td>
                        <td>BFEBFBFF000906E3</td>
                        <td><button style="background:none; border:none; color:red; cursor:pointer;" onclick="this.closest('tr').remove()">RESET</button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function login() {
            const u = document.getElementById('userInput').value;
            const p = document.getElementById('passInput').value;

            if(u === "Nash" && p === "Abyss2026") {
                document.getElementById('login').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login').style.display = 'none';
                    const dash = document.getElementById('dashboard');
                    dash.style.display = 'block';
                }, 600);
            } else {
                alert("Access Denied");
            }
        }

        function addKey() {
            const key = "ABYSS-" + Math.random().toString(36).substr(2, 9).toUpperCase();
            const row = `<tr><td>${key}</td><td><span class="badge" style="background:#333; color:white">PENDING</span></td><td>---</td><td><button style="background:none; border:none; color:red; cursor:pointer;" onclick="this.closest('tr').remove()">RESET</button></td></tr>`;
            document.getElementById('keyBody').innerHTML = row + document.getElementById('keyBody').innerHTML;
        }
    </script>
</body>
</html>
