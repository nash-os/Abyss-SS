<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abyss SS | Project Nash</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=JetBrains+Mono:wght@300;500;800&family=Inter:wght@300;400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --accent: #ff003c;
            --silver: #e5e5e5;
            --glass: rgba(8, 8, 8, 0.9);
            --border: rgba(255, 255, 255, 0.05);
            --glow: 0 0 30px rgba(255, 0, 60, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* FX BACKGROUND */
        #canvas-bg { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.4; }
        .vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, #000 100%);
            pointer-events: none;
        }

        /* ANIMATED LOGIN CARD */
        .auth-card {
            background: var(--glass);
            backdrop-filter: blur(60px);
            border: 1px solid var(--border);
            padding: 4rem;
            width: 480px;
            position: relative;
            box-shadow: 0 0 100px rgba(0,0,0,1);
            animation: emerge 1s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 10;
        }

        @keyframes emerge {
            0% { opacity: 0; transform: scale(0.95) translateY(20px); filter: blur(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        .logo-text {
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: 2.8rem;
            letter-spacing: 15px;
            text-align: center;
            margin-bottom: 3rem;
            background: linear-gradient(to right, #fff, var(--silver), #333);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .input-group { position: relative; margin-bottom: 2rem; }
        .input-group label {
            font-size: 0.6rem; font-weight: 900; color: #555;
            text-transform: uppercase; letter-spacing: 3px;
            position: absolute; top: -12px; left: 15px; background: #000; padding: 0 8px;
        }
        input {
            width: 100%; background: transparent; border: 1px solid #111;
            padding: 1.2rem; color: #fff; font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        input:focus { border-color: var(--accent); box-shadow: var(--glow); outline: none; }

        .btn {
            width: 100%; padding: 1.2rem; background: transparent;
            border: 1px solid var(--silver); color: var(--silver);
            font-family: 'Syncopate', sans-serif; font-size: 0.75rem; font-weight: 700;
            cursor: pointer; transition: 0.4s; letter-spacing: 2px;
        }
        .btn:hover { background: var(--silver); color: #000; box-shadow: 0 0 40px rgba(255,255,255,0.2); }

        /* DASHBOARD VIEW */
        #dash-view { display: none; width: 95%; max-width: 1400px; height: 85vh; padding: 0; overflow: hidden; }
        .dash-layout { display: grid; grid-template-columns: 300px 1fr; height: 100%; }

        aside { 
            background: rgba(5, 5, 5, 0.8); 
            border-right: 1px solid var(--border); 
            padding: 3rem 2rem; 
            display: flex;
            flex-direction: column;
        }
        
        nav li { 
            padding: 1.2rem; color: #333; font-size: 0.7rem; font-weight: 900; list-style: none;
            letter-spacing: 2px; transition: 0.3s; cursor: pointer;
        }
        nav li.active, nav li:hover { color: #fff; background: rgba(255, 255, 255, 0.02); border-right: 3px solid var(--accent); }

        main { padding: 4rem; overflow-y: auto; background: rgba(0,0,0,0.2); }
        main::-webkit-scrollbar { width: 3px; }
        main::-webkit-scrollbar-thumb { background: var(--accent); }

        .header-dash { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 4rem; }
        .header-dash h1 { font-size: 4rem; font-weight: 900; letter-spacing: -4px; line-height: 0.9; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 1.5rem; color: #222; font-size: 0.7rem; border-bottom: 2px solid #111; letter-spacing: 3px; font-weight: 900; }
        td { padding: 1.5rem; border-bottom: 1px solid #080808; font-family: 'JetBrains Mono'; font-size: 0.85rem; transition: 0.3s; }
        tr:hover td { background: rgba(255,255,255,0.01); color: var(--accent); }

        .status-tag { padding: 4px 10px; font-size: 0.65rem; font-weight: 900; background: #fff; color: #000; text-transform: uppercase; }
        .action-btn { color: var(--accent); font-weight: 900; background: none; border: none; font-size: 0.7rem; letter-spacing: 1px; cursor: pointer; }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>
    <div class="vignette"></div>

    <div id="login-view" class="auth-card">
        <div class="logo-text">ABYSS</div>
        <div class="input-group">
            <label>Operator ID</label>
            <input type="text" id="user" placeholder="NASH_SYSTEMS">
        </div>
        <div class="input-group">
            <label>Security Phrase</label>
            <input type="password" id="pass" placeholder="••••••••">
        </div>
        <button class="btn" onclick="initCore()">INITIALIZE_SESSION</button>
    </div>

    <div id="dash-view" class="auth-card">
        <div class="dash-layout">
            <aside>
                <div class="logo-text" style="font-size: 1.2rem; letter-spacing: 5px; text-align: left; margin-bottom: 5rem;">ABYSS SS</div>
                <nav>
                    <li class="active">DATABASE_STORAGE</li>
                    <li>HWID_CONTROLS</li>
                    <li>TRAFFIC_LOGS</li>
                    <li onclick="location.reload()" style="margin-top: auto; color: var(--accent);">TERMINATE_SESSION</li>
                </nav>
            </aside>
            <main>
                <div class="header-dash">
                    <div>
                        <h1>CORE_DB</h1>
                        <p style="color: #333; font-weight: 800; font-size: 0.7rem; margin-top: 10px;">AUTH_TOKEN: ACTIVE // REPO: ABYSS-SS</p>
                    </div>
                    <button class="btn" style="width: auto; padding: 1.2rem 2.5rem;" onclick="generateKey()">+ GENERATE_LICENSE</button>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th>IDENTIFIER</th>
                            <th>STATUS</th>
                            <th>HARDWARE_BOND</th>
                            <th>MANAGEMENT</th>
                        </tr>
                    </thead>
                    <tbody id="keyTableBody">
                        </tbody>
                </table>
            </main>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN DE ACCESO
        const GITHUB_TOKEN = "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"; 
        const REPO = "nash-os/Abyss-SS";
        const FILE_PATH = "keys.json";
        const API_URL = `https://api.github.com/repos/${REPO}/contents/${FILE_PATH}`;

        // CANVAS BACKGROUND ANIMATION
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let particles = [];
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        function initCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        class Particle {
            constructor() { this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height; this.s = Math.random()*2.5; this.v = Math.random()*0.4; }
            draw() { ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.beginPath(); ctx.arc(this.x, this.y, this.s, 0, Math.PI*2); ctx.fill(); this.y-=this.v; if(this.y < -10) this.y = canvas.height+10; }
        }
        initCanvas();
        for(let i=0; i<80; i++) particles.push(new Particle());
        function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p=>p.draw()); requestAnimationFrame(animate); }
        animate();

        // AUTH LOGIC
        function initCore() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "Nash" && p === "Abyss2026") {
                document.getElementById('login-view').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-view').style.display = 'none';
                    const dv = document.getElementById('dash-view');
                    dv.style.display = 'block';
                    loadDatabase();
                }, 500);
            } else { alert("SYSTEM_ERROR: INVALID_CREDENTIALS"); }
        }

        // DATABASE LOGIC (GITHUB SYNC)
        async function loadDatabase() {
            try {
                const res = await fetch(`https://raw.githubusercontent.com/${REPO}/main/${FILE_PATH}?t=${Date.now()}`);
                const data = await res.json();
                const tbody = document.getElementById('keyTableBody');
                tbody.innerHTML = '';
                
                Object.entries(data).forEach(([key, info]) => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${key}</td>
                            <td><span class="status-tag">${info.status}</span></td>
                            <td style="color: #444;">${info.hwid}</td>
                            <td><button class="action-btn" onclick="deleteKey('${key}')">[RESET]</button></td>
                        </tr>`;
                });
            } catch(e) { console.error("Sync Error:", e); }
        }

        async function generateKey() {
            const newKey = "ABYSS-" + Math.random().toString(36).substr(2, 9).toUpperCase();
            
            // 1. Get current SHA
            const get = await fetch(API_URL, { headers: { "Authorization": `token ${GITHUB_TOKEN}` } });
            const fileData = await get.json();
            const content = JSON.parse(atob(fileData.content));

            // 2. Add new data
            content[newKey] = { "hwid": "none", "status": "active", "expires": "2026-12-31" };

            // 3. Update GitHub
            const update = await fetch(API_URL, {
                method: "PUT",
                headers: { "Authorization": `token ${GITHUB_TOKEN}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: "Sync: License Generated",
                    content: btoa(JSON.stringify(content, null, 2)),
                    sha: fileData.sha
                })
            });

            if(update.ok) { loadDatabase(); } else { alert("GITHUB_API_ERROR"); }
        }

        async function deleteKey(target) {
            if(!confirm(`¿Eliminar llave ${target}?`)) return;
            const get = await fetch(API_URL, { headers: { "Authorization": `token ${GITHUB_TOKEN}` } });
            const fileData = await get.json();
            const content = JSON.parse(atob(fileData.content));
            
            delete content[target];

            await fetch(API_URL, {
                method: "PUT",
                headers: { "Authorization": `token ${GITHUB_TOKEN}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: "Sync: License Purged",
                    content: btoa(JSON.stringify(content, null, 2)),
                    sha: fileData.sha
                })
            });
            loadDatabase();
        }
    </script>
</body>
</html>
