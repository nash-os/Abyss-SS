<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abyss SS | Project Nash</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=JetBrains+Mono:wght@300;500;800&family=Inter:wght@300;400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --accent: #ff003c;
            --silver: #e5e5e5;
            --glass: rgba(8, 8, 8, 0.98);
            --border: rgba(255, 255, 255, 0.05);
            --glow: 0 0 30px rgba(255, 0, 60, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #canvas-bg { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.4; }
        .vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, #000 100%);
            pointer-events: none;
        }

        .auth-card {
            background: var(--glass);
            backdrop-filter: blur(60px);
            border: 1px solid var(--border);
            padding: 4rem;
            width: 480px;
            position: relative;
            box-shadow: 0 0 100px rgba(0,0,0,1);
            animation: emerge 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 10;
        }

        @keyframes emerge {
            0% { opacity: 0; transform: scale(0.95) translateY(20px); filter: blur(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        .logo-text {
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: 2.2rem;
            letter-spacing: 12px;
            text-align: center;
            margin-bottom: 3rem;
            background: linear-gradient(to right, #fff, var(--silver), #333);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .input-group { position: relative; margin-bottom: 2rem; }
        .input-group label {
            font-size: 0.6rem; font-weight: 900; color: #444;
            text-transform: uppercase; letter-spacing: 3px;
            position: absolute; top: -12px; left: 15px; background: #000; padding: 0 8px;
        }
        input {
            width: 100%; background: transparent; border: 1px solid #111;
            padding: 1.2rem; color: #fff; font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem; transition: 0.3s;
        }
        input:focus { border-color: var(--accent); box-shadow: var(--glow); outline: none; }

        .btn {
            width: 100%; padding: 1.2rem; background: transparent;
            border: 1px solid var(--silver); color: var(--silver);
            font-family: 'Syncopate', sans-serif; font-size: 0.7rem; font-weight: 700;
            cursor: pointer; transition: 0.4s; letter-spacing: 2px;
        }
        .btn:hover { background: var(--silver); color: #000; box-shadow: 0 0 40px rgba(255,255,255,0.1); }

        #dash-view { display: none; width: 95%; max-width: 1400px; height: 85vh; padding: 0; overflow: hidden; }
        .dash-layout { display: grid; grid-template-columns: 280px 1fr; height: 100%; }

        aside { 
            background: rgba(5, 5, 5, 0.8); 
            border-right: 1px solid var(--border); 
            padding: 3rem 2rem; 
            display: flex;
            flex-direction: column;
        }
        
        nav li { 
            padding: 1.2rem; color: #333; font-size: 0.65rem; font-weight: 900; list-style: none;
            letter-spacing: 2px; transition: 0.3s; cursor: pointer;
        }
        nav li.active, nav li:hover { color: #fff; border-left: 3px solid var(--accent); background: rgba(255,255,255,0.01); }

        main { padding: 4rem; overflow-y: auto; background: rgba(0,0,0,0.3); }
        .header-dash { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 4rem; }
        .header-dash h1 { font-size: 3.5rem; font-weight: 900; letter-spacing: -3px; line-height: 0.9; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 1.5rem; color: #222; font-size: 0.6rem; border-bottom: 1px solid #111; letter-spacing: 3px; }
        td { padding: 1.5rem; border-bottom: 1px solid #080808; font-family: 'JetBrains Mono'; font-size: 0.8rem; }
        
        .status-tag { padding: 4px 8px; font-size: 0.6rem; font-weight: 900; background: #fff; color: #000; text-transform: uppercase; }
        .action-btn { color: var(--accent); font-weight: 900; background: none; border: none; font-size: 0.65rem; letter-spacing: 1px; cursor: pointer; }
        .action-btn:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>
    <div class="vignette"></div>

    <div id="login-view" class="auth-card">
        <div class="logo-text">ABYSS</div>
        <div class="input-group">
            <label>Operator ID</label>
            <input type="text" id="user" value="Nash">
        </div>
        <div class="input-group">
            <label>Security Phrase</label>
            <input type="password" id="pass" value="Abyss2026">
        </div>
        <button class="btn" onclick="initCore()">INITIALIZE_SESSION</button>
    </div>

    <div id="dash-view" class="auth-card">
        <div class="dash-layout">
            <aside>
                <div class="logo-text" style="font-size: 1rem; letter-spacing: 5px; text-align: left; margin-bottom: 5rem;">ABYSS SS</div>
                <nav>
                    <li class="active">/ DATABASE</li>
                    <li onclick="location.reload()" style="margin-top: auto; color: var(--accent);">/ DISCONNECT</li>
                </nav>
            </aside>
            <main>
                <div class="header-dash">
                    <div>
                        <h1>CORE_DB</h1>
                        <p id="status-text" style="color: #444; font-weight: 800; font-size: 0.65rem; margin-top: 10px;">AUTH_TOKEN: ACTIVE // REPO: ABYSS-SS</p>
                    </div>
                    <button class="btn" style="width: auto; padding: 1.2rem 2.5rem;" onclick="generateKey()">+ GENERATE_NEW</button>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th>IDENTIFIER</th>
                            <th>STATUS</th>
                            <th>HARDWARE_BOND</th>
                            <th>MANAGEMENT</th>
                        </tr>
                    </thead>
                    <tbody id="keyTableBody"></tbody>
                </table>
            </main>
        </div>
    </div>

    <script>
        // CONFIG - REEMPLAZA EL TOKEN SI ESTÁ BORRADO
        const GITHUB_TOKEN = "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"; 
        const REPO = "nash-os/Abyss-SS";
        const FILE_PATH = "keys.json";
        const API_URL = `https://api.github.com/repos/${REPO}/contents/${FILE_PATH}`;

        // Iniciar Sesión
        function initCore() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "Nash" && p === "Abyss2026") {
                document.getElementById('login-view').style.display = 'none';
                document.getElementById('dash-view').style.display = 'block';
                loadDatabase();
            } else { alert("ACCESS_DENIED"); }
        }

        // Cargar Datos (Sin Cache)
        async function loadDatabase() {
            const statusText = document.getElementById('status-text');
            statusText.innerText = "REFRESHING DATABASE...";
            
            try {
                // Forzamos la descarga del raw para evitar cache de GitHub
                const res = await fetch(API_URL, {
                    headers: { 
                        "Authorization": `token ${GITHUB_TOKEN}`,
                        "Accept": "application/vnd.github.v3.raw",
                        "Cache-Control": "no-cache"
                    }
                });
                
                const data = await res.json();
                const tbody = document.getElementById('keyTableBody');
                tbody.innerHTML = '';
                
                Object.entries(data).forEach(([key, info]) => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${key}</td>
                            <td><span class="status-tag">${info.status}</span></td>
                            <td style="color: #444;">${info.hwid}</td>
                            <td>
                                <button class="action-btn" onclick="deleteKey('${key}')">[DELETE]</button>
                            </td>
                        </tr>`;
                });
                statusText.innerText = "AUTH_TOKEN: ACTIVE // SYNCED";
            } catch(e) { 
                statusText.innerText = "OFFLINE // SYNC_ERROR";
            }
        }

        // Función Blindada para Generar
        async function generateKey() {
            const statusText = document.getElementById('status-text');
            const newKey = "ABYSS-" + Math.random().toString(36).substr(2, 9).toUpperCase();
            
            statusText.innerText = "ACCESSING GITHUB CORE...";

            try {
                const response = await fetch(API_URL, { 
                    headers: { "Authorization": `token ${GITHUB_TOKEN}` } 
                });

                const fileData = await response.json();
                const content = JSON.parse(decodeURIComponent(escape(atob(fileData.content))));

                content[newKey] = { "hwid": "none", "status": "active", "expires": "2026-12-31" };

                statusText.innerText = "PUSHING UPDATE...";

                const update = await fetch(API_URL, {
                    method: "PUT",
                    headers: { 
                        "Authorization": `token ${GITHUB_TOKEN}`, 
                        "Content-Type": "application/json" 
                    },
                    body: JSON.stringify({
                        message: `System: Created ${newKey}`,
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2)))),
                        sha: fileData.sha
                    })
                });

                if (update.ok) { loadDatabase(); }
            } catch (e) {
                alert("Error de conexión: Verifica tu Token y permisos del Repo.");
            }
        }

        // Función para Borrar
        async function deleteKey(target) {
            if(!confirm(`¿PURGE ${target}?`)) return;
            const statusText = document.getElementById('status-text');
            statusText.innerText = "PURGING FROM DATABASE...";

            try {
                const response = await fetch(API_URL, { 
                    headers: { "Authorization": `token ${GITHUB_TOKEN}` } 
                });
                const fileData = await response.json();
                const content = JSON.parse(decodeURIComponent(escape(atob(fileData.content))));
                
                delete content[target];

                const update = await fetch(API_URL, {
                    method: "PUT",
                    headers: { 
                        "Authorization": `token ${GITHUB_TOKEN}`, 
                        "Content-Type": "application/json" 
                    },
                    body: JSON.stringify({
                        message: `System: Purged ${target}`,
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2)))),
                        sha: fileData.sha
                    })
                });

                if (update.ok) { loadDatabase(); }
            } catch (e) {
                alert("Error al eliminar.");
            }
        }

        // Particle Background
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let particles = [];
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        function initCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        class P {
            constructor() { this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height; this.s = Math.random()*2; this.v = Math.random()*0.3; }
            draw() { ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.beginPath(); ctx.arc(this.x, this.y, this.s, 0, 7); ctx.fill(); this.y-=this.v; if(this.y < -10) this.y = canvas.height+10; }
        }
        initCanvas();
        for(let i=0; i<60; i++) particles.push(new P());
        function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p=>p.draw()); requestAnimationFrame(animate); }
        animate();
    </script>
</body>
</html>
